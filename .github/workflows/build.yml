name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'   # نسخه فلاتر خود را وارد کنید
          channel: 'stable'
      - run: flutter pub get
      # 🔥 خط جادویی: بازسازی فایل‌های Gradle
      - run: flutter create --project-name sci_flow .
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
